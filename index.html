<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject Study Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --primary: #4CAF50;
    --primary-strong: #45a049;
    --accent: #008CBA;
    --danger: #f44336;
    --th-bg: var(--primary);
}

.dark {
    --bg: #0b1220;
    --card-bg: #0f1724;
    --text: #e6eef8;
    --muted: #9aa6b2;
    --primary: #2ea44f;
    --primary-strong: #24903f;
    --accent: #0b8bb0;
    --danger: #e14b4b;
    --th-bg: #14532d;
}

html, body {
    height: 100%;
}

body {
    font-family: 'Noto Sans Bengali', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
}
.container {
    max-width: 1200px;
    margin: auto;
    background: var(--card-bg);
    padding: 20px;
    border-radius: 10px;
    overflow-x: auto;
    box-shadow: 0 2px 8px rgba(2,6,23,0.06);
}
input, select, button {
    padding: 8px;
    margin-top: 5px;
}
button {
    cursor: pointer;
    padding: 10px 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 5px;
    font-family: 'Noto Sans Bengali', sans-serif;
}
button:hover {
    background: var(--primary-strong);
}
#downloadBtn {
    background: var(--accent);
}
#downloadBtn:hover {
    background: #07607a;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
th, td {
    border: 1px solid rgba(0,0,0,0.08);
    padding: 8px;
    text-align: center;
}
th {
    background: var(--th-bg);
    color: white;
}

/* small theme toggle */
#themeToggle {
    background: transparent;
    border: 1px solid rgba(0,0,0,0.08);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* delete subject box style in dark */
.dark #deleteSubjectList button {
    border: 1px solid rgba(255,255,255,0.06);
}

/* subject management panels in dark mode */
.subject-management {
    background: #f0f8ff;
}
.subject-delete {
    background: #fff5f5;
}

.dark .subject-management {
    background: #1e293b; /* darker bluish */
}
.dark .subject-delete {
    background: #422727; /* dark reddish tone */
    border-left-color: var(--danger);
}
.dark .subject-delete h4 {
    color: var(--danger);
}

.data-share-section {
    background: #f5f5f5;
}

.dark .data-share-section {
    background: #1a2332;
}
</style>
</head>

<body>

<div class="container">

<h2>Subject Wise Study Manager</h2>
<div style="text-align: right; margin-top: -36px;">
    <button id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
</div>

<div id="aspirantToggle" style="margin:10px 0;">
    <label><input type="radio" name="aspType" value="engi" checked> Engi aspirant</label>
    <label style="margin-left: 20px;"><input type="radio" name="aspType" value="med"> Med aspirant</label>
</div>

<div style="display:flex; gap:20px; margin: 10px 0 18px 0; align-items:center;">
    <div>সমগ্র কমপ্লিট: <strong id="overallPercent">0%</strong></div>
    <div>নির্বাচিত সাবজেক্ট কমপ্লিট: <strong id="subjectPercent">0%</strong></div>
</div>

<div class="subject-management" style="padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <h3>📚 সাবজেক্টস ম্যানেজমেন্ট</h3>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 8px;"><strong>নতুন সাবজেক্ট তৈরি করুন:</strong></label>
        <input type="text" id="newSubject" placeholder="যেমন: Chemistry, Physics" style="width: 300px; padding: 10px;">
        <button onclick="prepareNewSubject()" style="margin-left: 10px; padding: 10px 20px;">+ সাবজেক্ট তৈরি করুন</button>
    </div>

    <div id="chapterInputSection" style="display: none; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary);">
        <p><strong>সাবজেক্ট: <span id="newSubjectName" style="color: var(--primary);"></span></strong></p>
        <label style="display: block; margin-bottom: 8px;">চ্যাপ্টার লিস্ট পেস্ট করুন (একটি লাইনে একটি চ্যাপ্টার):</label>
        <textarea id="chapterListText" placeholder="যেমন:&#10;চ্যাপ্টার ১&#10;চ্যাপ্টার ২&#10;চ্যাপ্টার ৩" style="width:100%;height:120px;"></textarea>
        <div style="margin-top: 10px;">
            <button onclick="addChaptersToSubject()" style="padding: 8px 16px; margin-right: 8px;">✦ চ্যাপ্টার যোগ করুন</button>
            <button onclick="cancelNewSubject()" style="padding: 8px 16px; background: #999;">বাতিল করুন</button>
        </div>
    </div>

    <div id="subjectList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
</div>

<div class="subject-delete" style="padding: 12px; border-radius: 8px; border-left: 4px solid #f44336; margin-bottom: 20px;">
    <h4 style="margin-top: 0; color: #f44336;">🗑️ সাবজেক্ট ডিলিট করুন</h4>
    <div id="deleteSubjectList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
</div>

<div class="data-share-section" style="padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <h3>📊 ডাটা শেয়ার করুন</h3>
    <button id="copyBtn" onclick="copyData()" style="padding: 10px 20px; background: #555; margin-bottom: 10px;">📋 ডাটা কপি করুন</button>
    <br>
    <textarea id="importText" placeholder="ইখানে JSON পেস্ট করুন" style="width:100%;height:80px; margin-top:10px;"></textarea>
    <button onclick="pasteImport()" style="margin-top:5px;padding:8px 16px;">📥 পেস্ট ডাটা ইমপোর্ট</button>
</div>

<div id="chapterSection" style="display: none;">
    <h3>📖 চ্যাপ্টার ম্যানেজমেন্ট</h3>
    <p>নির্বাচিত সাবজেক্ট: <strong id="currentSubjectName"></strong></p>
    <br>

    <input type="text" id="newChapter" placeholder="নতুন অধ্যায়ের নাম লিখুন" style="width: 70%; padding: 10px;">
    <button onclick="addChapter()" style="margin-left: 10px; padding: 10px 20px;">+ চ্যাপ্টার যোগ করুন</button>
    <!-- Download/Upload removed as requested -->

    <table>
    <thead>
    <tr>
    <th>ক্রমিক নাম্বার</th>
    <th>অধ্যায়ের নাম</th>
    <th>কমপ্লিট</th>
    <th>সোর্স</th>
    <th class="cq-col">সিকিউ</th>
    <th class="mcq-col">এমসিকিউ</th>
    <th class="engi-col">Engi</th>
    <th class="med-col">Med</th>
    <th>অ্যাকশন</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>

let newSubjectForChapters = null; // সাবজেক্ট যোগ করার সময় এখানে তথ্য রাখা হয়

function init() {
    if(!localStorage.getItem("subjects")) {
        // প্রথমবার অ্যাপ খোলা হলে জীববিজ্ঞান ২য় পত্র দিয়ে শুরু করুন
        const subjects = {};
        const chapters = [
            "অধ্যায় ১: প্রাণীর বিভিন্নতা ও শ্রেণিবিন্যাস",
            "অধ্যায় ২: প্রাণীর পরিচিতি (হাইড্রা, ঘাসফড়িং, রুই মাছ)",
            "অধ্যায় ৩: পরিপাক ও শোষণ",
            "অধ্যায় ৪: রক্ত ও সংবহন",
            "অধ্যায় ৫: শ্বসন ও শ্বাসক্রিয়া",
            "অধ্যায় ৬: বর্জ্য ও নিষ্কাশন",
            "অধ্যায় ৭: চলন ও অঙ্গচালনা",
            "অধ্যায় ৮: সমন্বয় ও নিয়ন্ত্রণ",
            "অধ্যায় ৯: মানব জীবনের ধারাবাহিকতা (প্রজনন)",
            "অধ্যায় ১০: প্রতিরক্ষা (Immunity)",
            "অধ্যায় ১১: জিনতত্ত্ব ও বিবর্তন",
            "অধ্যায় ১২: প্রাণীর আচরণ"
        ];
        subjects["জীববিজ্ঞান ২য় পত্র"] = chapters.map((ch, i) => ({
            serial: i + 1,
            name: ch,
            complete: false,
            source: "",
            cq: false,
            mcq: false,
            engi: false,
            med: false
        }));
        localStorage.setItem("subjects", JSON.stringify(subjects));
    } else {
        // মাইগ্রেশন: পুরনো ডেটায় নতুন ফিল্ড যোগ করুন
        const subjects = JSON.parse(localStorage.getItem("subjects"));
        Object.keys(subjects).forEach(subject => {
            subjects[subject].forEach(row => {
                if(row.engi === undefined) row.engi = false;
                if(row.med === undefined) row.med = false;
            });
        });
        localStorage.setItem("subjects", JSON.stringify(subjects));
    }
    loadSubjects();
}

function loadSubjects() {
    const subjects = JSON.parse(localStorage.getItem("subjects"));
    const list = document.getElementById("subjectList");
    list.innerHTML = "";

    Object.keys(subjects).forEach(sub => {
            const subjectBtn = document.createElement("button");
            subjectBtn.style.cssText = "background: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: 'Noto Sans Bengali', sans-serif;";
            subjectBtn.innerText = sub;
            subjectBtn.onclick = () => selectSubject(sub);
            list.appendChild(subjectBtn);
    });
    
    // যদি সাবজেক্ট থাকে তাহলে প্রথমটা সিলেক্ট করুন
    const firstSubject = Object.keys(subjects)[0];
    if(firstSubject) {
        selectSubject(firstSubject);
    }
    
        // ডিলিট লিস্ট লোড করুন
        loadDeleteSubjectList();
        computePercentages();
        updateAspirantVisibility();
    }

    function loadDeleteSubjectList() {
        const subjects = JSON.parse(localStorage.getItem("subjects"));
        const deleteList = document.getElementById("deleteSubjectList");
        deleteList.innerHTML = "";

        Object.keys(subjects).forEach(sub => {
            const deleteBtn = document.createElement("button");
            deleteBtn.style.cssText = "background: #f44336; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: 'Noto Sans Bengali', sans-serif;";
            deleteBtn.innerText = "❌ " + sub;
            deleteBtn.title = "এই সাবজেক্ট ডিলিট করুন";
            deleteBtn.onclick = () => deleteSubject(sub);
            deleteList.appendChild(deleteBtn);
        });
}

function selectSubject(subName) {
    document.getElementById("currentSubjectName").innerText = subName;
    document.getElementById("chapterSection").style.display = "block";
    loadTable(subName);
}

function loadTable(subName = null) {
    const subjects = JSON.parse(localStorage.getItem("subjects"));
    const current = subName || document.getElementById("currentSubjectName").innerText;
    const data = subjects[current] || [];

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach((row, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.serial}</td>
            <td contenteditable="true" onblur="updateField(${index}, 'name', this.innerText)">${row.name}</td>
            <td><input type="checkbox" ${row.complete ? "checked" : ""} onchange="updateField(${index}, 'complete', this.checked)"></td>
            <td><input value="${row.source}" onchange="updateField(${index}, 'source', this.value)"></td>
            <td class="cq-col"><input type="checkbox" ${row.cq ? "checked" : ""} onchange="updateField(${index}, 'cq', this.checked)"></td>
            <td class="mcq-col"><input type="checkbox" ${row.mcq ? "checked" : ""} onchange="updateField(${index}, 'mcq', this.checked)"></td>
            <td class="engi-col"><input type="checkbox" ${row.engi ? "checked" : ""} onchange="updateField(${index}, 'engi', this.checked)"></td>
            <td class="med-col"><input type="checkbox" ${row.med ? "checked" : ""} onchange="updateField(${index}, 'med', this.checked)"></td>
            <td><button onclick="deleteChapter(${index})" style="background: #f44336; padding: 5px 10px; font-size: 12px;">ডিলিট</button></td>
        `;

        tbody.appendChild(tr);
    });
    computePercentages();
    updateAspirantVisibility();
}

function updateField(index, field, value) {
    const subjects = JSON.parse(localStorage.getItem("subjects"));
    const current = document.getElementById("currentSubjectName").innerText;
    if(!subjects[current]) return;
    subjects[current][index][field] = value;
    localStorage.setItem("subjects", JSON.stringify(subjects));
    computePercentages();
}

function deleteChapter(index) {
    if(confirm("এই চ্যাপ্টার ডিলিট করতে চান?")) {
        const subjects = JSON.parse(localStorage.getItem("subjects"));
        const current = document.getElementById("currentSubjectName").innerText;
        subjects[current].splice(index, 1);
        
        // পুনরায় serial নাম্বার আপডেট করুন
        subjects[current].forEach((row, i) => {
            row.serial = i + 1;
        });
        
        localStorage.setItem("subjects", JSON.stringify(subjects));
        loadTable();
    }
}

function deleteSubject(subName) {
    if(confirm(subName + " সাবজেক্ট ডিলিট করতে চান? সব চ্যাপ্টার হারিয়ে যাবে!")) {
        const subjects = JSON.parse(localStorage.getItem("subjects"));
        delete subjects[subName];
        localStorage.setItem("subjects", JSON.stringify(subjects));
        loadSubjects();
    }
}
function prepareNewSubject() {
    const name = document.getElementById("newSubject").value.trim();
    if(!name) {
        alert("সাবজেক্টের নাম লিখুন");
        return;
    }

    const subjects = JSON.parse(localStorage.getItem("subjects"));
    if(subjects[name]) {
        alert("এই সাবজেক্ট ইতিমধ্যে আছে! অন্য নাম দিন।");
        return;
    }

    // তিনটি state set করুন
    newSubjectForChapters = name;
    document.getElementById("newSubjectName").innerText = name;
    document.getElementById("chapterInputSection").style.display = "block";
    document.getElementById("chapterListText").value = "";
    document.getElementById("chapterListText").focus();
}

function addChaptersToSubject() {
    if(!newSubjectForChapters) return;

    const chapterText = document.getElementById("chapterListText").value.trim();
    if(!chapterText) {
        alert("অন্তত একটি চ্যাপ্টার লিখুন");
        return;
    }

    const chapters = chapterText.split('\n').map(ch => ch.trim()).filter(ch => ch); // খালি লাইন বাদ দিন
    if(chapters.length === 0) {
        alert("কোনো চ্যাপ্টার পাওয়া যায়নি");
        return;
    }

    const subjects = JSON.parse(localStorage.getItem("subjects"));
    subjects[newSubjectForChapters] = chapters.map((ch, i) => ({
        serial: i + 1,
        name: ch,
        complete: false,
        source: "",
        cq: false,
        mcq: false,
        engi: false,
        med: false
    }));

    localStorage.setItem("subjects", JSON.stringify(subjects));
    alert(newSubjectForChapters + ' এ ' + chapters.length + 'টি চ্যাপ্টার যোগ করা হয়েছে!');
    cancelNewSubject();
    loadSubjects();
}

function cancelNewSubject() {
    newSubjectForChapters = null;
    document.getElementById("newSubject").value = "";
    document.getElementById("chapterListText").value = "";
    document.getElementById("chapterInputSection").style.display = "none";
}


function addChapter() {
    const chapterName = document.getElementById("newChapter").value;
    if(!chapterName) return;

    const subjects = JSON.parse(localStorage.getItem("subjects"));
    const current = document.getElementById("currentSubjectName").innerText;
    if(!subjects[current]) subjects[current] = [];

    const newSerial = subjects[current].length + 1;

    subjects[current].push({
        serial: newSerial,
        name: chapterName,
        complete: false,
        source: "",
        cq: false,
        mcq: false,
        engi: false,
        med: false
    });

    localStorage.setItem("subjects", JSON.stringify(subjects));
    document.getElementById("newChapter").value = "";
    loadTable();
}

// Clipboard export / paste import
function copyData() {
    const subjects = localStorage.getItem('subjects') || '{}';
    navigator.clipboard.writeText(subjects).then(() => {
        alert('ডাটা ক্লিপবোর্ডে কপি করা হয়েছে, এখন WhatsApp-এ পেস্ট করুন।');
    });
}

function pasteImport() {
    const txt = document.getElementById('importText').value;
    if(!txt) return;
    try {
        const imported = JSON.parse(txt);
        handleImportedData(imported);
    } catch(e) {
        alert('ভুল JSON - কপি করা ডাটা সঠিক কিনা চেক করুন');
    }
}

function handleImportedData(imported) {
    if(typeof imported !== 'object' || Array.isArray(imported) || imported === null) {
        alert('ডাটা সঠিক ফরম্যাটে নেই');
        return;
    }

    const ok = confirm('OK = সম্পূর্ণ রিপ্লেস করুন। Cancel = মার্জ করুন (নতুন সাবজেক্ট যোগ করবে)');
    if(ok) {
        localStorage.setItem('subjects', JSON.stringify(imported));
        loadSubjects();
        alert('ডাটা রিপ্লেস করা হয়েছে');
        document.getElementById('importText').value = '';
        return;
    }

    // Merge
    const subjects = JSON.parse(localStorage.getItem('subjects') || '{}');
    Object.keys(imported).forEach(sub => {
        const incomingChapters = Array.isArray(imported[sub]) ? imported[sub] : [];
        if(!subjects[sub]) {
            subjects[sub] = incomingChapters;
        } else {
            incomingChapters.forEach(r => {
                const exists = subjects[sub].some(s => s.name === r.name);
                if(!exists) {
                    subjects[sub].push(r);
                }
            });
        }
        subjects[sub].forEach((row, i) => row.serial = i + 1);
    });

    localStorage.setItem('subjects', JSON.stringify(subjects));
    loadSubjects();
    alert('ডাটা মার্জ হয়েছে');
    document.getElementById('importText').value = '';
}


// Download and upload functionality removed per user request

function computePercentages() {
    const subjects = JSON.parse(localStorage.getItem('subjects') || '{}');
    let total = 0, done = 0;
    Object.keys(subjects).forEach(sub => {
        const list = Array.isArray(subjects[sub]) ? subjects[sub] : [];
        list.forEach(ch => {
            total++;
            if(ch && ch.complete) done++;
        });
    });
    const overall = total ? Math.round((done / total) * 100) : 0;
    const overallEl = document.getElementById('overallPercent');
    if(overallEl) overallEl.innerText = overall + '%';

    const current = document.getElementById('currentSubjectName') ? document.getElementById('currentSubjectName').innerText : '';
    let stotal = 0, sdone = 0;
    if(current && subjects[current]) {
        subjects[current].forEach(ch => {
            stotal++;
            if(ch && ch.complete) sdone++;
        });
    }
    const subjectPct = stotal ? Math.round((sdone / stotal) * 100) : 0;
    const subjectEl = document.getElementById('subjectPercent');
    if(subjectEl) subjectEl.innerText = subjectPct + '%';
}

function updateAspirantVisibility() {
    const type = localStorage.getItem('aspType') || 'engi';
    document.querySelectorAll('.engi-col').forEach(el => {
        el.style.display = type === 'engi' ? '' : 'none';
    });
    document.querySelectorAll('.med-col').forEach(el => {
        el.style.display = type === 'med' ? '' : 'none';
    });
}

// listen for aspirant radio changes
const aspirantRadios = document.getElementsByName('aspType');
for(const r of aspirantRadios) {
    r.addEventListener('change', function() {
        localStorage.setItem('aspType', this.value);
        updateAspirantVisibility();
    });
}


// Theme functions
function applyTheme(theme) {
    if(theme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
}

function updateThemeButton() {
    const btn = document.getElementById('themeToggle');
    if(!btn) return;
    if(document.documentElement.classList.contains('dark')) {
        btn.innerText = '☀️';
        btn.title = 'Switch to light mode';
    } else {
        btn.innerText = '🌙';
        btn.title = 'Switch to dark mode';
    }
}

function toggleTheme() {
    const isDark = document.documentElement.classList.contains('dark');
    const next = isDark ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme', next);
    updateThemeButton();
}

function loadSavedOrSystemTheme() {
    const saved = localStorage.getItem('theme');
    if(saved) applyTheme(saved);
    else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
    else applyTheme('light');
    updateThemeButton();
}

// initialize
loadSavedOrSystemTheme();
// set aspirant radio from storage
const savedAsp = localStorage.getItem('aspType') || 'engi';
const radio = document.querySelector(`input[name='aspType'][value='${savedAsp}']`);
if(radio) radio.checked = true;
updateAspirantVisibility();
init();

</script>
